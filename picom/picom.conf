shadow = false;
shadow-radius = 0;
shadow-offset-x = 0;
shadow-offset-y = 0;

fading = true;
fade-in-step = 0.15;
fade-out-step = 0.15;

active-opacity = 0.99;
inactive-opacity = 0.99;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "90:class_g = 'konsole' && focused",
  "40:class_g = 'konsole' && !focused",
  "100:class_g = 'mpv' && !focused",
  "100:class_g = 'mpv' && focused",
];

corner-radius = 8;

blur-method = "dual_kawase";
blur-strength = 4;
blur-kern = "3x3box";

backend = "glx";
glx-copy-from-front = false;
dithered-present = false;
vsync = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

use-damage = true;
log-level = "warn";

shadow-exclude = [
  "window_type = 'popup_menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'tooltip'",
  "window_type = 'menu'",
  "window_type = 'utility'",
  "class_g     = 'fladder'",
  "class_g     = 'Fladder'",
  "class_g     = 'mpv'",
  "class_g     = 'vivaldi-stable'",
  "class_g     = 'fladder-bin'"
];

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'popup_menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'tooltip'",
  "window_type = 'menu'",
  "window_type = 'utility'",
  "class_g     = 'fladder'",
  "class_g     = 'Fladder'",
  "class_g     = 'mpv'",
  "class_g     = 'vivaldi-stable'",
  "class_g     = 'fladder-bin'"
];

rounded-corners-exclude = [
  "window_type = 'popup_menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'tooltip'",
  "window_type = 'menu'",
  "window_type = 'utility'",
  "class_g     = 'fladder'",
  "class_g     = 'Fladder'",
  "class_g     = 'mpv'",
  "class_g     = 'vivaldi-stable'",
  "class_g     = 'fladder-bin'"
];

animations = true
animation-stiffness = 300.0;
animation-dampening = 22.0;
animation-clamping = true;
animation-mass = 1;
animation-for-open-window = "squeeze";
animation-for-menu-window = "slide-down";
animation-for-transient-window = "slide-down";

# (requires pijulius)
animation-for-workspace-switch-in = "zoom";
animation-for-workspace-switch-out = "zoom";

wintypes:
{
  tooltip = { fade = false; shadow = false; opacity = 1.0; focus = true; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { shadow = false; fade = false; opacity = 1.0; };
  dropdown_menu = { shadow = false; fade = false; opacity = 1.0; };
  menu = { shadow = false; fade = false; opacity = 1.0; };
  utility = { shadow = false; fade = false; opacity = 1.0; };
};
